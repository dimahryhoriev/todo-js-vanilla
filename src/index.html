<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
    <link rel="stylesheet" href="main.css">
    <title>To-do List</title>
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__title">
                Get-It-Done
            </div>
            <button class="header__theme" type="button">
                <span class="header__theme-title">
                </span>
                <div class="header__theme-icon">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M41.9701 24.972C41.7826 28.4443 40.5934 31.788 38.5462 34.5988C36.499 37.4097 33.6814 39.5674 30.4341 40.8111C27.1868 42.0548 23.6487 42.3312 20.2476 41.6071C16.8465 40.8829 13.728 39.1891 11.269 36.7303C8.80998 34.2716 7.11582 31.1532 6.39128 27.7522C5.66674 24.3512 5.94284 20.8131 7.1862 17.5656C8.42957 14.3182 10.587 11.5004 13.3976 9.45288C16.2082 7.40537 19.5518 6.21581 23.0241 6.028C23.8341 5.984 24.2581 6.948 23.8281 7.634C22.3898 9.93511 21.774 12.6557 22.081 15.3519C22.3881 18.0481 23.5999 20.5606 25.5187 22.4794C27.4375 24.3982 29.95 25.61 32.6462 25.917C35.3423 26.2241 38.0629 25.6082 40.364 24.17C41.052 23.74 42.0141 24.162 41.9701 24.972Z"
                            stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M24 32C28.4183 32 32 28.4183 32 24C32 19.5817 28.4183 16 24 16C19.5817 16 16 19.5817 16 24C16 28.4183 19.5817 32 24 32Z"
                            stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M24 4V8" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M24 40V44" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M9.85999 9.85999L12.68 12.68" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M35.3199 35.3201L38.1399 38.1401" stroke="white" stroke-width="4"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M4 24H8" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M40 24H44" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M12.68 35.3201L9.85999 38.1401" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M38.1399 9.85999L35.3199 12.68" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
            </button>
        </header>
        <main class="todo">
            <div class="todo__title">My Tasks</div>
            <form class="todo__form">
                <input class="todo__form-input" type="text" placeholder="Type your task here..">
                <button class="todo__form-btn" type="submit">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M12 5V19" stroke="white" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span>Add</span>
                </button>
            </form>
            <div class="todo__content">
                <div class="todo__content-empty">
                    <img src="/src/assets/images/selfie-light.png" alt="">
                    <p>
                        Empty as my motivation on Monday 😅. Let’s start adding stuff!
                    </p>
                </div>
                <div class="todo__filters is-hidden">
                    <ul class="todo__filters-list">
                        <li class="todo__filters-item">
                            <button class="todo__filters-btn is-active js-filter" data-filter="all" type="button">
                                All
                            </button>
                        </li>
                        <li class="todo__filters-divider" aria-hidden="true">
                            |
                        </li>
                        <li class="todo__filters-item">
                            <button class="todo__filters-btn js-filter" data-filter="active" type="button">
                                Active
                            </button>
                        </li>
                        <li class="todo__filters-divider" aria-hidden="true">
                            |
                        </li>
                        <li class="todo__filters-item">
                            <button class="todo__filters-btn js-filter" data-filter="completed" type="button">
                                Completed
                            </button>
                        </li>
                    </ul>
                    <div class="todo__count">2 tasks left</div>
                </div>
                <ul class="todo__list is-hidden">
                    <template id="task-template">
                        <li class="todo__list-item">
                            <div class="todo__item-content">
                                <label class="todo__item-checkbox">
                                    <input type="checkbox">
                                    <span>
                                        <svg width="8" height="6" viewBox="0 0 8 6" fill="none"
                                            xmlns="http://www.w3.org/2000/svg">
                                            <path d="M1 3L3 5L7 1" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round" />
                                        </svg>
                                    </span>
                                </label>
                                <p class="todo__item-title js-title">
                                    Learn React
                                </p>
                            </div>
                            <div class="todo__item-controls">
                                <button class="todo__item-btn todo__item-btn--edit" type="button" aria-label="Edit">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M21.1739 6.812C21.7026 6.28342 21.9997 5.56647 21.9998 4.81885C21.9999 4.07124 21.703 3.35421 21.1744 2.8255C20.6459 2.29679 19.9289 1.99971 19.1813 1.99962C18.4337 1.99952 17.7166 2.29642 17.1879 2.825L3.84193 16.174C3.60975 16.4055 3.43805 16.6905 3.34193 17.004L2.02093 21.356C1.99509 21.4425 1.99314 21.5343 2.01529 21.6219C2.03743 21.7094 2.08285 21.7892 2.14673 21.853C2.21061 21.9168 2.29055 21.9621 2.37809 21.9841C2.46563 22.0061 2.55749 22.004 2.64393 21.978L6.99693 20.658C7.3101 20.5628 7.59511 20.3921 7.82693 20.161L21.1739 6.812Z"
                                            stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path d="M15 5L19 9" stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                    </svg>
                                </button>
                                <button class="todo__item-btn todo__item-btn--delete js-delete" type="button"
                                    aria-label="Delete">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6"
                                            stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path d="M3 6H21" stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path
                                            d="M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6"
                                            stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                    </svg>
                                </button>
                            </div>
                        </li>
                    </template>
                    <template id="task-template-complete">
                        <li class="todo__list-item todo__list-item--done">
                            <div class="todo__item-content">
                                <label class="todo__item-checkbox">
                                    <input type="checkbox">
                                    <span>
                                        <svg width="8" height="6" viewBox="0 0 8 6" fill="none"
                                            xmlns="http://www.w3.org/2000/svg">
                                            <path d="M1 3L3 5L7 1" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round" />
                                        </svg>
                                    </span>
                                </label>
                                <p class="todo__item-title js-title">
                                    Learn React
                                </p>
                            </div>
                            <div class="todo__item-controls">
                                <button class="todo__item-btn todo__item-btn--edit" type="button" aria-label="Edit">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M21.1739 6.812C21.7026 6.28342 21.9997 5.56647 21.9998 4.81885C21.9999 4.07124 21.703 3.35421 21.1744 2.8255C20.6459 2.29679 19.9289 1.99971 19.1813 1.99962C18.4337 1.99952 17.7166 2.29642 17.1879 2.825L3.84193 16.174C3.60975 16.4055 3.43805 16.6905 3.34193 17.004L2.02093 21.356C1.99509 21.4425 1.99314 21.5343 2.01529 21.6219C2.03743 21.7094 2.08285 21.7892 2.14673 21.853C2.21061 21.9168 2.29055 21.9621 2.37809 21.9841C2.46563 22.0061 2.55749 22.004 2.64393 21.978L6.99693 20.658C7.3101 20.5628 7.59511 20.3921 7.82693 20.161L21.1739 6.812Z"
                                            stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path d="M15 5L19 9" stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                    </svg>
                                </button>
                                <button class="todo__item-btn todo__item-btn--delete js-delete" type="button"
                                    aria-label="Delete">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6"
                                            stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path d="M3 6H21" stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path
                                            d="M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6"
                                            stroke="black" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                    </svg>
                                </button>
                            </div>
                        </li>
                    </template>
                </ul>
            </div>
        </main>
        <footer class="footer">
            <div class="footer__copy">
                &copy; <span id="current-year">2026</span>
            </div>
        </footer>
    </div>

    <script src="js/app.js" type="module"></script>
</body>

</html>
